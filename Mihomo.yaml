rule-providers:
  rule_adblock:
    type: http
    url: https://raw.githubusercontent.com/ahlawisnu/CLASH/refs/heads/main/adblock.yaml
    behavior: classical
    path: ./rule_provider/adblock.yaml

  rule_haram:
    type: http
    url: https://raw.githubusercontent.com/ahlawisnu/CLASH/refs/heads/main/haram.yaml
    behavior: domain
    path: ./rule_provider/haram.yaml

  rule_18+:
    type: http
    url: https://raw.githubusercontent.com/ahlawisnu/CLASH/refs/heads/main/18+.yaml
    behavior: domain
    path: ./rule_provider/18+.yaml

  rule_malware:
    type: http
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/malware.txt
    behavior: domain
    path: ./rule_provider/malware.yaml

  rule_gambling:
    type: http
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/releas/gambling.txt
    behavior: domain
    path: ./rule_provider/gambling.yaml

  rule_tracker:
    type: http
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/privac.txt
    behavior: domain
    path: ./rule_provider/tracker.yaml

tun:
  enable: true
  dns-hijack:
