proxy-providers:
  SERVER:
    type: file
    path: "./akun.yaml"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - BEST-PING
      - FALLBACK
      - LB
    use:
      - SERVER
    
  - name: UMUM
    type: select
    proxies:
      - MANUAL
      - BEST-PING
      - FALLBACK
      - LB
    use:
      - SERVER
    
  - name: FINAL
    type: select
    proxies:
      - UMUM
      - DIRECT
      
  - name: ADBLOCK+
    type: select
    proxies:
      - REJECT
      - FALLBACK

  - name: FALLBACK
    type: fallback
    use:
      - SERVER
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: BEST-PING
    type: url-test
    use:
      - SERVER
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  - name: LB
    type: load-balance
    strategy: round-robin
    use:
      - SERVER
    url: http://www.gstatic.com/generate_204
    interval: 300
    
port: 7893
socks-port: 7891
redir-port: 7892
mixed-port: 7890
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

